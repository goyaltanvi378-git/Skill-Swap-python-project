<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap – Student Skill Exchange Network</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Meta tags for basic SEO -->
    <meta name="description" content="SkillSwap – Student Skill Exchange Network. Exchange your knowledge instead of money. Connect with peers to share AWS, Python, Java, React, and other skills.">
</head>
<body>

    <!-- Mobile Sidebar Toggle -->
    <button class="sidebar-toggle-btn" id="sidebarToggle" style="display: none;">
        <i class="bi bi-list fs-4"></i>
    </button>

    <!-- App Container (Dynamic Viewports) -->
    <div id="appViewport">
        <!-- Views will be dynamically loaded here by app.js -->
        <div id="loadingScreen" class="d-flex flex-column justify-content-center align-items-center" style="height: 100vh;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Launching SkillSwap...</p>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1200;">
        <div id="appToast" class="toast align-items-center border-0 text-white" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">
                    Welcome to SkillSwap!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main Frontend Logic App -->
    <script src="/static/js/app.js"></script>
</body>
</html>
